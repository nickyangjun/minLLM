; minLLM 配置文件（INI）
; ------------------------------------------------------------
; 使用说明：
; 1) 本文件用于控制模型结构、训练参数、运行环境和生成参数。
; 2) 以 ; 或 # 开头的行是注释，不会被程序读取。
; 3) 训练并保存权重：python main.py --mode train
; 4) 加载权重聊天：python main.py --mode chat
; 4) 也可命令行临时覆盖：
;    python main.py --train-steps 200 --prompt "人工智能"
; ------------------------------------------------------------
; 调参建议（先看）：
; - 每次只改 1~2 个参数，便于定位效果来源。
; - 训练变慢时，优先减小 block_size / embed_dim / num_layers。
; - loss 波动大时，优先减小 learning_rate。
; - 显存或内存不足时，优先减小 batch_size、block_size。

[model]
; embed_dim: token 向量维度（隐藏维度）。
; 越大表达能力通常越强，但训练更慢、资源占用更高。
; 常用起点：16 / 32 / 64
embed_dim = 32

; block_size: 上下文窗口长度（每次最多看多少字符历史）。
; 越大越能学习长依赖，但计算开销随长度显著增加。
; 注意：语料长度必须 > block_size，否则无法采样训练 batch。
; 常用起点：8 / 16 / 32
block_size = 16

; num_heads: 多头注意力头数。
; 必须满足：embed_dim % num_heads == 0
; 头数增大可学习更丰富关系，但也会增加计算。
; 常用起点：1 / 2 / 4
num_heads = 2

; num_layers: Transformer Block 层数。
; 层数越深，模型容量越大；训练时间也更长。
; 小语料场景下层数过大容易过拟合或训练不稳定。
; 常用起点：1 / 2 / 4
num_layers = 2

[train]
; batch_size: 每步训练样本数。
; 越大梯度估计更稳定，但更占内存。
; 常用起点：4 / 8 / 16
batch_size = 4

; learning_rate: 学习率。
; 过大：loss 震荡甚至发散；过小：收敛很慢。
; 常用起点：1e-3（不稳可试 3e-4）
learning_rate = 0.001

; train_steps: 总训练步数。
; 用于控制训练时长。学习阶段建议先小步数快速迭代。
; 常用流程：先 100~300 验证流程，再提升到 1000+。
train_steps = 1000

; eval_interval: 日志打印间隔（每多少步打印一次 loss）。
; 值越小日志越频繁，便于观察；值越大会更简洁。
eval_interval = 200

[runtime]
; device: 运行设备。
; 可选：cpu / cuda / mps（取决于本机和 PyTorch 支持）。
; 当前默认 cpu，兼容性最好。
device = cpu

; seed: 随机种子。
; 固定种子可提升实验可复现性（同环境下尽量一致）。
seed = 42

[data]
; corpus_path: 训练语料路径（相对路径或绝对路径均可）。
; 推荐使用 UTF-8 文本文件。
; 语料越丰富，生成通常越稳定。
corpus_path = sample_corpus_zh.txt

; max_new_tokens: 生成的新 token 数量（不含 prompt 本身）。
; 数值越大，生成文本越长，耗时也更长。
max_new_tokens = 40

[checkpoint]
; checkpoint_path: 模型权重保存/加载路径。
; train 模式结束后会自动保存；chat 模式会从这里读取。
checkpoint_path = checkpoints/minllm.pt
